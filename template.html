<body>

  <script>
    // System Translations generated from local data.json
    const translations = {{TRANSLATIONS_JS}};

    function setLanguage(lang) {
      const t = translations[lang] || translations.en;
      document.getElementById('ui-title').textContent = t.title;
      document.getElementById('ui-bio').textContent = t.bio;
      document.getElementById('ui-topic-line').textContent = t.topicLine;
      document.getElementById('ui-creator-title').textContent = t.creatorTitle;
      document.getElementById('ui-tg-title').textContent = t.tgTitle;
      document.getElementById('ui-tg-sub').textContent = t.tgSub;
      document.getElementById('ui-dc-title').textContent = t.dcTitle;
      document.getElementById('ui-dc-sub').textContent = t.dcSub;
      document.getElementById('ui-section-title').textContent = t.sectionTitle;
      document.documentElement.lang = lang;

      // 简体中文使用独立 TG 频道，其他语种还原默认链接
      const tgBtn = document.querySelector('.tg-banner');
      if (tgBtn) {
        const zhUrl = tgBtn.getAttribute('data-enc-url-zh');
        const defaultUrl = tgBtn.getAttribute('data-enc-url');
        if (lang === 'zh' && zhUrl) {
          tgBtn.setAttribute('href', atob(zhUrl));
        } else {
          tgBtn.setAttribute('href', atob(defaultUrl));
        }
      }

      // Translate all resource card titles dynamically based on data-title attributes
      const cards = document.querySelectorAll('.resource-card');
      cards.forEach(card => {
        const titleEl = card.querySelector('.card-title');
        if (titleEl) {
          const localizedTitle = card.getAttribute(`data-title-${lang}`) || 
                                 card.getAttribute('data-title-en') || 
                                 card.getAttribute('data-title-default');
          if (localizedTitle) {
            titleEl.textContent = localizedTitle;
          }
        }
      });
    }

    // Decrypt Base64 obfuscated URLs to protect links from scrapers
    function decryptLinks() {
      document.querySelectorAll('[data-enc-url]').forEach(el => {
        try {
          const rawUrl = atob(el.getAttribute('data-enc-url'));
          el.setAttribute('href', rawUrl);
        } catch (e) {
          console.error("Failed to decrypt link", e);
        }
      });
    }

    function detectLanguage() {
      const userLang = navigator.language || navigator.userLanguage;
      const langLower = userLang.toLowerCase();
      
      if (['zh-tw', 'zh-hk', 'zh-mo'].some(item => langLower.includes(item)) || langLower === 'zh-hant') {
        setLanguage('zh-hant');
      } else if (langLower.startsWith('zh')) {
        setLanguage('zh');
      } else if (langLower.startsWith('ja')) {
        setLanguage('ja');
      } else if (langLower.startsWith('ko')) {
        setLanguage('ko');
      } else {
        setLanguage('en');
      }
    }
    
    // Initialize detection and decrypt URLs
    detectLanguage();
    decryptLinks();
  </script>
