const CATALOG_RESOURCES = Array.isArray(window.DEMO_RESOURCES) && window.DEMO_RESOURCES.length
  ? window.DEMO_RESOURCES
  : RESOURCES;
const PAGE_SIZE = 48;
const CHANNEL_LINKS = {
  telegramDefault: '=YjMsJXdwV3ajJ2Ll1mL09yL6MHc0RHa',
  telegramZh: 'iVHalJXYoN3ahB3apB3Ll1mL09yL6MHc0RHa',
  discord: '=czcmN3YVJmVhR2LndmLkJ3bjNXak9yL6MHc0RHa'
};

let currentLang = 'zh';
let activeCategory = 'all';
let searchQuery = '';
let renderedLimit = PAGE_SIZE;

function renderChips() {
  const row = document.getElementById('chipRow');
  
  let catsToRender = [...CATEGORIES];
  if (currentLang === 'zh' || currentLang === 'zh-hant') {
    const allCat = catsToRender.find(c => c.key === 'all');
    const aiCat = catsToRender.find(c => c.key === 'aidrama');
    const others = catsToRender.filter(c => c.key !== 'all' && c.key !== 'aidrama');
    catsToRender = [allCat, aiCat, ...others];
  }

  row.innerHTML = catsToRender.map(c => {
    const label = c.labels[currentLang] || c.labels.en;
    return `<div class="cat-chip ${c.key === activeCategory ? 'active' : ''}" data-cat="${c.key}">${label}</div>`;
  }).join('');
  
  row.querySelectorAll('.cat-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeCategory = chip.getAttribute('data-cat');
      if (searchQuery) {
        searchQuery = '';
        const input = document.getElementById('searchInput');
        input.value = '';
        toggleClearBtn();
      }
      renderedLimit = PAGE_SIZE;
      renderChips();
      applyFilters();
    });
  });
}

function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[char]);
}

function decodeUrl(encodedUrl) {
  try {
    return atob(encodedUrl.split('').reverse().join(''));
  } catch {
    return '#';
  }
}

function getCategoryMeta(categoryKey) {
  return CATEGORIES.find(category => category.key === categoryKey) || null;
}

function getCategoryLabel(categoryKey) {
  const category = getCategoryMeta(categoryKey);
  return category?.labels?.[currentLang] || category?.labels?.en || categoryKey;
}

function getResourceTime(resource) {
  return Number(resource.createdAt || resource.updatedAt || 0);
}

function sortByLatest(a, b) {
  const timeDiff = getResourceTime(b.resource) - getResourceTime(a.resource);
  if (timeDiff) return timeDiff;
  return a.index - b.index;
}

function getFilteredResources() {
  const query = searchQuery.toLowerCase();
  const matched = CATALOG_RESOURCES.map((resource, index) => {
    const searchableTitles = resource.searchTitles || Object.values(resource.titles || {});
    const matchIndexes = query
      ? searchableTitles.map(title => String(title).toLowerCase().indexOf(query)).filter(matchIndex => matchIndex >= 0)
      : [];
    const titleMatch = matchIndexes.length ? Math.min(...matchIndexes) : -1;
    const matchCategory = query || activeCategory === 'all' || resource.category === activeCategory;
    return { resource, index, titleMatch, visible: matchCategory && (!query || titleMatch >= 0) };
  }).filter(item => item.visible);

  return matched.sort((a, b) => {
    if (query && a.titleMatch !== b.titleMatch) return a.titleMatch - b.titleMatch;
    if (!query && Boolean(a.resource.isCollection) !== Boolean(b.resource.isCollection)) return Number(Boolean(b.resource.isCollection)) - Number(Boolean(a.resource.isCollection));
    if (!query && activeCategory !== 'all') return sortByLatest(a, b);
    if (query) return sortByLatest(a, b);
    return a.index - b.index;
  });
}

function buildAllSections(items) {
  const collectionItems = items
    .filter(item => item.resource.isCollection)
    .sort((a, b) => (a.resource.categoryOrder || 999) - (b.resource.categoryOrder || 999));
  const normalItems = items.filter(item => !item.resource.isCollection);
  const categoryKeys = CATEGORIES
    .filter(category => category.key !== 'all')
    .sort((a, b) => {
      const orderA = CATALOG_RESOURCES.find(resource => resource.category === a.key)?.categoryOrder || 999;
      const orderB = CATALOG_RESOURCES.find(resource => resource.category === b.key)?.categoryOrder || 999;
      return orderA - orderB;
    })
    .map(category => category.key);

  const groups = [];
  if (collectionItems.length) {
    groups.push({ key: 'collections', label: UI_TRANSLATIONS[currentLang]?.collectionSection || 'Top collections', items: collectionItems });
  }

  for (const categoryKey of categoryKeys) {
    const groupItems = normalItems
      .filter(item => item.resource.category === categoryKey)
      .sort(sortByLatest);
    if (groupItems.length) {
      groups.push({ key: categoryKey, label: getCategoryLabel(categoryKey), items: groupItems, suffix: UI_TRANSLATIONS[currentLang]?.latestSection || '' });
    }
  }

  return groups;
}

function renderCard(resource) {
    const title = resource.titles?.[currentLang] || resource.titles?.en || resource.original;
    const preview = resource.thumb
      ? `<img src="${escapeHtml(resource.thumb)}" class="preview-img" alt="" loading="lazy">`
      : `<span class="preview-fallback" style="--tile-hue:${Number(resource.hue) || 280}">${escapeHtml(resource.placeholder || resource.category || '•')}</span>`;
    const resourceUrl = resource.encodedUrl ? decodeUrl(resource.encodedUrl) : (resource.url || '#');
    return `<a href="${escapeHtml(resourceUrl)}" class="resource-card" target="_blank" rel="noopener noreferrer">
      <div class="preview-box">${preview}</div>
      <div class="card-body"><div class="card-title">${escapeHtml(title)}</div></div>
      <div class="status-icon">${escapeHtml(resource.icon || '◆')}</div>
    </a>`;
}

function renderResources(items) {
  const list = document.getElementById('resourceList');
  if (activeCategory === 'all' && !searchQuery) {
    let remaining = renderedLimit;
    const html = [];
    for (const group of buildAllSections(items)) {
      if (remaining <= 0) break;
      const visibleItems = group.items.slice(0, remaining);
      if (!visibleItems.length) continue;
      const suffix = group.suffix ? `<span>${escapeHtml(group.suffix)}</span>` : '';
      html.push(`<div class="section-group-title"><strong>${escapeHtml(group.label)}</strong>${suffix}</div>`);
      html.push(...visibleItems.map(({ resource }) => renderCard(resource)));
      remaining -= visibleItems.length;
    }
    list.innerHTML = html.join('');
    return;
  }

  list.innerHTML = items.slice(0, renderedLimit).map(({ resource }) => renderCard(resource)).join('');
}

function applyFilters() {
  const items = getFilteredResources();
  const t = UI_TRANSLATIONS[currentLang] || UI_TRANSLATIONS.en;
  renderResources(items);
  document.getElementById('resultCount').textContent = items.length + t.countUnit;
  document.getElementById('emptyState').textContent = t.emptyText;
  document.getElementById('emptyState').classList.toggle('show', items.length === 0);
  document.getElementById('loadMore').classList.toggle('show', items.length > renderedLimit);
  document.getElementById('loadMore').textContent = t.loadMore;
}

function toggleClearBtn() {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('has-text', document.getElementById('searchInput').value.length > 0);
}

function setLanguage(lang) {
  const t = UI_TRANSLATIONS[lang] || UI_TRANSLATIONS.en;
  currentLang = UI_TRANSLATIONS[lang] ? lang : 'en';

  document.getElementById('ui-title').textContent = t.title;
  document.getElementById('ui-bio').textContent = t.bio;
  document.getElementById('ui-tg-title').textContent = t.tgTitle;
  document.getElementById('ui-tg-sub').textContent = t.tgSub;
  document.getElementById('ui-dc-title').textContent = t.dcTitle;
  document.getElementById('ui-dc-sub').textContent = t.dcSub;
  document.getElementById('ui-section-title').textContent = t.sectionTitle;
  document.getElementById('searchInput').placeholder = t.searchPlaceholder;
  document.getElementById('tgBanner').href = decodeUrl(currentLang === 'zh' ? CHANNEL_LINKS.telegramZh : CHANNEL_LINKS.telegramDefault);
  document.getElementById('dcBanner').href = decodeUrl(CHANNEL_LINKS.discord);
  document.documentElement.lang = currentLang;

  document.querySelectorAll('.lang-link').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-lang') === currentLang);
  });

  renderChips();
  applyFilters();
}

function detectLanguage() {
  const userLang = navigator.language || navigator.userLanguage;
  const langLower = userLang.toLowerCase();

  if (['zh-tw', 'zh-hk', 'zh-mo'].some(item => langLower.includes(item)) || langLower === 'zh-hant') {
    setLanguage('zh-hant');
  } else if (langLower.startsWith('zh')) {
    setLanguage('zh');
  } else if (langLower.startsWith('ja')) {
    setLanguage('ja');
  } else if (langLower.startsWith('ko')) {
    setLanguage('ko');
  } else {
    setLanguage('en');
  }
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim().toLowerCase();
  if (searchQuery) {
    activeCategory = 'all';
    renderChips();
  }
  renderedLimit = PAGE_SIZE;
  toggleClearBtn();
  applyFilters();
});

document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  renderedLimit = PAGE_SIZE;
  toggleClearBtn();
  applyFilters();
});

const loadMoreBtn = document.getElementById('loadMore');
let isLoading = false;

loadMoreBtn.addEventListener('click', () => {
  if (isLoading) return;
  isLoading = true;
  loadMoreBtn.textContent = UI_TRANSLATIONS[currentLang]?.loadingText || "Loading...";
  
  setTimeout(() => {
    renderedLimit += PAGE_SIZE;
    applyFilters();
    isLoading = false;
  }, 100);
});

if ('IntersectionObserver' in window) {
  const observer = new IntersectionObserver((entries) => {
    const target = entries[0];
    if (target.isIntersecting && loadMoreBtn.classList.contains('show') && !isLoading) {
      loadMoreBtn.click();
    }
  }, {
    rootMargin: '200px',
    threshold: 0.1
  });
  
  observer.observe(loadMoreBtn);
}

detectLanguage();
</script>
